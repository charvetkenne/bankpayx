spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bankpayx_auth_db
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false 
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bankpayx  
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: auth-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081   # <-- UN AUTRE PORT ! (auth-service ≠ eureka)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true 

keycloak:
  admin:
    url: http://localhost:8080
    token: YOUR_ADMIN_TOKEN
  realm: bankpayx    
